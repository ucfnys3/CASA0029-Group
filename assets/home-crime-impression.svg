<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1800 1000" role="img" aria-labelledby="title desc">
  <title id="title">Abstract night-time London crime atlas impression</title>
  <desc id="desc">A moody abstract city scene with map lines, street lights, and orange-red hotspot glows.</desc>
  <defs>
    <linearGradient id="sky" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#121826"/>
      <stop offset="0.55" stop-color="#273040"/>
      <stop offset="1" stop-color="#090b10"/>
    </linearGradient>
    <radialGradient id="glow" cx="55%" cy="70%" r="45%">
      <stop offset="0" stop-color="#ff8a3d" stop-opacity="0.82"/>
      <stop offset="0.24" stop-color="#c93d2d" stop-opacity="0.42"/>
      <stop offset="0.7" stop-color="#08101c" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blueGlow" cx="38%" cy="78%" r="48%">
      <stop offset="0" stop-color="#7bb7c8" stop-opacity="0.32"/>
      <stop offset="0.72" stop-color="#07111c" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <pattern id="grain" width="140" height="140" patternUnits="userSpaceOnUse">
      <rect width="140" height="140" fill="transparent"/>
      <circle cx="12" cy="18" r="1" fill="#fff" opacity="0.05"/>
      <circle cx="83" cy="42" r="1.2" fill="#fff" opacity="0.04"/>
      <circle cx="121" cy="91" r="0.9" fill="#fff" opacity="0.05"/>
      <circle cx="50" cy="123" r="1" fill="#000" opacity="0.1"/>
    </pattern>
  </defs>

  <rect width="1800" height="1000" fill="url(#sky)"/>
  <rect width="1800" height="1000" fill="url(#blueGlow)"/>
  <rect width="1800" height="1000" fill="url(#glow)"/>

  <g opacity="0.28" fill="none" stroke="#e9d8c7" stroke-width="2">
    <path d="M-40 730 C 180 680, 250 780, 420 720 S 760 610, 920 690 S 1260 800, 1510 710 S 1770 650, 1860 690"/>
    <path d="M-30 820 C 200 760, 340 850, 520 790 S 870 720, 1040 775 S 1390 885, 1810 820"/>
    <path d="M170 650 L370 820 L610 650 L820 850 L1030 630 L1260 820 L1510 660"/>
    <path d="M240 900 L510 690 L840 880 L1140 665 L1450 900"/>
  </g>

  <g opacity="0.24" fill="#f8efe5">
    <circle cx="270" cy="700" r="5"/>
    <circle cx="420" cy="720" r="4"/>
    <circle cx="625" cy="648" r="6"/>
    <circle cx="820" cy="850" r="4"/>
    <circle cx="1040" cy="775" r="5"/>
    <circle cx="1260" cy="820" r="6"/>
    <circle cx="1510" cy="660" r="5"/>
  </g>

  <g filter="url(#soft)" opacity="0.62">
    <ellipse cx="950" cy="760" rx="220" ry="70" fill="#ff5a2f"/>
    <ellipse cx="650" cy="810" rx="160" ry="58" fill="#d64834"/>
    <ellipse cx="1240" cy="735" rx="150" ry="54" fill="#f3a35b"/>
  </g>

  <g fill="#111621">
    <rect x="0" y="565" width="120" height="435"/>
    <rect x="116" y="520" width="95" height="480"/>
    <rect x="210" y="615" width="130" height="385"/>
    <rect x="338" y="455" width="78" height="545"/>
    <rect x="418" y="588" width="150" height="412"/>
    <rect x="566" y="500" width="88" height="500"/>
    <rect x="654" y="640" width="165" height="360"/>
    <rect x="822" y="405" width="110" height="595"/>
    <rect x="932" y="555" width="170" height="445"/>
    <rect x="1106" y="462" width="92" height="538"/>
    <rect x="1198" y="620" width="165" height="380"/>
    <rect x="1366" y="510" width="98" height="490"/>
    <rect x="1466" y="575" width="150" height="425"/>
    <rect x="1616" y="490" width="86" height="510"/>
    <rect x="1702" y="628" width="110" height="372"/>
  </g>

  <g opacity="0.55" fill="#f0d5a7">
    <rect x="145" y="570" width="10" height="34"/>
    <rect x="270" y="665" width="12" height="42"/>
    <rect x="372" y="515" width="9" height="30"/>
    <rect x="608" y="555" width="11" height="38"/>
    <rect x="874" y="465" width="12" height="42"/>
    <rect x="974" y="610" width="12" height="42"/>
    <rect x="1142" y="520" width="10" height="35"/>
    <rect x="1320" y="680" width="12" height="38"/>
    <rect x="1414" y="560" width="10" height="36"/>
    <rect x="1660" y="540" width="11" height="40"/>
  </g>

  <g opacity="0.55">
    <rect x="0" y="735" width="1800" height="265" fill="#06080d"/>
    <path d="M0 805 C 260 780, 450 842, 720 798 S 1230 765, 1800 825 L1800 1000 L0 1000 Z" fill="#0b0e14"/>
    <path d="M-30 922 L650 735 L845 1000 L-30 1000 Z" fill="#171b23"/>
    <path d="M1850 920 L1100 725 L925 1000 L1850 1000 Z" fill="#171b23"/>
    <path d="M430 1000 L820 760 L1020 760 L1400 1000 Z" fill="#222833" opacity="0.82"/>
    <path d="M910 790 L905 1000" stroke="#f1d9bf" stroke-width="3" opacity="0.4"/>
  </g>

  <g opacity="0.76" stroke="#f6d19b" stroke-width="7" stroke-linecap="round">
    <path d="M0 820 L360 788"/>
    <path d="M1800 830 L1415 790"/>
  </g>

  <g opacity="0.78" fill="none" stroke="#ffb06b" stroke-width="5">
    <path d="M121 820 L360 790 L620 825" stroke-dasharray="18 18"/>
    <path d="M1680 825 L1430 790 L1160 815" stroke-dasharray="18 18"/>
  </g>

  <rect width="1800" height="1000" fill="url(#grain)"/>
  <rect width="1800" height="1000" fill="#05070d" opacity="0.12"/>
</svg>
